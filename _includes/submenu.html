<!--
  submenu.html
  ──────────────────────────────────────────────────────────────────────────────
  Reusable dropdown submenu component.

  Usage:
    {% include submenu.html items=item.children %}

  Where `items` is an array of { title, url } objects from _config.yml.

  The submenu is hidden by default (CSS + aria-hidden) and revealed
  by nav.js when the parent button is activated (click or keyboard Enter/Space).
  ──────────────────────────────────────────────────────────────────────────────
-->
<ul
  class="submenu"
  role="list"
  aria-label="Submenu"
  aria-hidden="true"
>
  {%- for child in include.items -%}
  <li class="submenu__item" role="listitem">
    <a
      class="submenu__link{% if page.url == child.url %} is-active{% endif %}"
      href="{{ child.url | relative_url }}"
      {%- if page.url == child.url %} aria-current="page"{% endif %}
      tabindex="-1"
    >
      <span class="submenu__label">{{ child.title }}</span>
    </a>
  </li>
  {%- endfor -%}
</ul>
