<header class="site-header" role="banner">

  <!-- ── Top bar: wordmark + meta + hamburger ──────────────── -->
  <div class="nav-top">
    <a class="wordmark" href="{{ '/' | relative_url }}" aria-label="{{ site.title }} — home">
      Follow<span class="wordmark__accent">.</span>Or<span class="wordmark__accent">.</span>Bounce
    </a>
    <span class="nav-meta" aria-hidden="true">
      Est.&nbsp;{{ site.brand.established }}&nbsp;/&nbsp;{{ site.brand.issue }}
    </span>
    <!-- Hamburger — visible only on mobile via CSS -->
    {%- include nav-mobile.html -%}
  </div>

  <!-- ── Desktop navigation bar (hidden on mobile via CSS) ─── -->
  {%- include nav.html -%}

</header>
