<svg viewBox="0 0 1536 1024" xmlns="http://www.w3.org/2000/svg" width="1536" height="1024">
  <defs>
    <!-- Deep void background -->
    <radialGradient id="mandorla" cx="50%" cy="48%" r="45%">
      <stop offset="0%"   stop-color="#c8920a" stop-opacity="0.09"/>
      <stop offset="30%"  stop-color="#c8920a" stop-opacity="0.04"/>
      <stop offset="65%"  stop-color="#c8920a" stop-opacity="0.01"/>
      <stop offset="100%" stop-color="#050400" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="bgGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%"   stop-color="#120f08"/>
      <stop offset="60%"  stop-color="#0d0b06"/>
      <stop offset="100%" stop-color="#050400"/>
    </radialGradient>

    <!-- Gold horizontal rule gradient -->
    <linearGradient id="ruleH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#8a6420" stop-opacity="0"/>
      <stop offset="20%"  stop-color="#8a6420" stop-opacity="0.55"/>
      <stop offset="50%"  stop-color="#c8920a" stop-opacity="0.7"/>
      <stop offset="80%"  stop-color="#8a6420" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#8a6420" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="ruleH2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#8a6420" stop-opacity="0"/>
      <stop offset="25%"  stop-color="#8a6420" stop-opacity="0.35"/>
      <stop offset="50%"  stop-color="#8a6420" stop-opacity="0.45"/>
      <stop offset="75%"  stop-color="#8a6420" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#8a6420" stop-opacity="0"/>
    </linearGradient>

    <!-- Vertical gold rule -->
    <linearGradient id="ruleV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#8a6420" stop-opacity="0"/>
      <stop offset="20%"  stop-color="#8a6420" stop-opacity="0.4"/>
      <stop offset="50%"  stop-color="#c8920a" stop-opacity="0.5"/>
      <stop offset="80%"  stop-color="#8a6420" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#8a6420" stop-opacity="0"/>
    </linearGradient>

    <!-- Blood/ember gradient for tag borders -->
    <linearGradient id="bloodGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#6a1a08"/>
      <stop offset="100%" stop-color="#c8920a"/>
    </linearGradient>

    <!-- Halo ring filter (soft glow) -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="glowSoft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="textGlow" x="-20%" y="-80%" width="140%" height="260%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Clip for inner region -->
    <clipPath id="innerClip">
      <rect x="80" y="60" width="1376" height="904"/>
    </clipPath>
  </defs>

  <!-- ═══════════════════════════════════════════════
       BACKGROUND
  ════════════════════════════════════════════════ -->
  <rect width="1536" height="1024" fill="#050400"/>
  <rect width="1536" height="1024" fill="url(#bgGlow)"/>

  <!-- Mandorla glow behind center -->
  <ellipse cx="768" cy="490" rx="640" ry="480" fill="url(#mandorla)"/>

  <!-- ═══════════════════════════════════════════════
       SACRED GEOMETRY — CONCENTRIC CIRCLES (eucharist icon)
  ════════════════════════════════════════════════ -->
  <!-- Outermost halos — very faint -->
  <circle cx="768" cy="490" r="410" fill="none" stroke="#8a6420" stroke-width="0.5" opacity="0.08"/>
  <circle cx="768" cy="490" r="360" fill="none" stroke="#8a6420" stroke-width="0.5" opacity="0.10"/>

  <!-- Halo ring (main) -->
  <circle cx="768" cy="490" r="310" fill="none" stroke="#c8920a" stroke-width="0.8" opacity="0.13" filter="url(#glow)"/>
  <circle cx="768" cy="490" r="290" fill="none" stroke="#c8920a" stroke-width="0.4" opacity="0.10"/>

  <!-- Inner rings -->
  <circle cx="768" cy="490" r="220" fill="none" stroke="#c8920a" stroke-width="0.7" opacity="0.14"/>
  <circle cx="768" cy="490" r="160" fill="none" stroke="#c8920a" stroke-width="0.6" opacity="0.16"/>
  <circle cx="768" cy="490" r="90"  fill="none" stroke="#c8920a" stroke-width="0.8" opacity="0.20" filter="url(#glow)"/>
  <circle cx="768" cy="490" r="38"  fill="none" stroke="#e8b84b" stroke-width="0.9" opacity="0.22"/>

  <!-- Axis cross — horizontal & vertical hairlines through center -->
  <line x1="768" y1="150" x2="768" y2="830" stroke="#c8920a" stroke-width="0.4" opacity="0.12"/>
  <line x1="420" y1="490" x2="1116" y2="490" stroke="#c8920a" stroke-width="0.4" opacity="0.12"/>

  <!-- Star of David triangles (Seal of Solomon layering) -->
  <polygon points="768,220 998,610 538,610"
           fill="none" stroke="#8a6420" stroke-width="0.5" opacity="0.14"/>
  <polygon points="768,760 538,370 998,370"
           fill="none" stroke="#8a6420" stroke-width="0.5" opacity="0.14"/>

  <!-- Diagonal axis lines -->
  <line x1="500" y1="230" x2="1036" y2="750" stroke="#c8920a" stroke-width="0.3" opacity="0.09"/>
  <line x1="1036" y1="230" x2="500" y2="750" stroke="#c8920a" stroke-width="0.3" opacity="0.09"/>

  <!-- ═══════════════════════════════════════════════
       OUTER FRAME / BORDER
  ════════════════════════════════════════════════ -->
  <!-- Corner marks — architectural brackets -->
  <!-- Top-left -->
  <line x1="60" y1="60" x2="140" y2="60"  stroke="#8a6420" stroke-width="1" opacity="0.5"/>
  <line x1="60" y1="60" x2="60"  y2="140" stroke="#8a6420" stroke-width="1" opacity="0.5"/>
  <!-- Top-right -->
  <line x1="1476" y1="60" x2="1396" y2="60"  stroke="#8a6420" stroke-width="1" opacity="0.5"/>
  <line x1="1476" y1="60" x2="1476" y2="140" stroke="#8a6420" stroke-width="1" opacity="0.5"/>
  <!-- Bottom-left -->
  <line x1="60" y1="964" x2="140" y2="964" stroke="#8a6420" stroke-width="1" opacity="0.5"/>
  <line x1="60" y1="964" x2="60"  y2="884" stroke="#8a6420" stroke-width="1" opacity="0.5"/>
  <!-- Bottom-right -->
  <line x1="1476" y1="964" x2="1396" y2="964" stroke="#8a6420" stroke-width="1" opacity="0.5"/>
  <line x1="1476" y1="964" x2="1476" y2="884" stroke="#8a6420" stroke-width="1" opacity="0.5"/>

  <!-- Full outer rect (very faint) -->
  <rect x="60" y="60" width="1416" height="904" fill="none" stroke="#8a6420" stroke-width="0.4" opacity="0.18"/>

  <!-- ═══════════════════════════════════════════════
       TOP NAV LINE
  ════════════════════════════════════════════════ -->
  <rect x="60" y="100" width="1416" height="1" fill="url(#ruleH2)" opacity="0.6"/>

  <!-- Nav text left -->
  <text x="80" y="88" font-family="'Cinzel', 'Trajan Pro', Georgia, serif" font-size="11"
        letter-spacing="5" fill="#8a6420" opacity="0.75" text-anchor="start">
    DIVINE LITURGY — ARCHITECTURE
  </text>

  <!-- Nav text right -->
  <text x="1456" y="88" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="10"
        letter-spacing="3" fill="#7a7060" opacity="0.6" text-anchor="end">
    PROTOCOL ANALYSIS · 2026
  </text>

  <!-- ═══════════════════════════════════════════════
       BOTTOM RULE & FOOTER
  ════════════════════════════════════════════════ -->
  <rect x="60" y="924" width="1416" height="1" fill="url(#ruleH2)" opacity="0.5"/>

  <!-- Footer left -->
  <text x="80" y="950" font-family="Georgia, 'EB Garamond', serif" font-size="10.5"
        letter-spacing="1.5" fill="#7a7060" opacity="0.55" font-style="italic" text-anchor="start">
    Sacred Protocol · Eastern Christianity · Orthodox
  </text>

  <!-- Footer right -->
  <text x="1456" y="950" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="10"
        letter-spacing="3" fill="#7a7060" opacity="0.45" text-anchor="end">
    ✦ &#160; 2026 &#160; ✦
  </text>

  <!-- ═══════════════════════════════════════════════
       CROSS ORNAMENT
  ════════════════════════════════════════════════ -->
  <text x="768" y="222" font-family="Georgia, serif" font-size="22"
        letter-spacing="28" fill="#8a6420" opacity="0.65" text-anchor="middle">
    ✦ ✦ ✦
  </text>

  <!-- ═══════════════════════════════════════════════
       MAIN TITLE
  ════════════════════════════════════════════════ -->
  <!-- Glow layer -->
  <text x="768" y="380" font-family="'Cinzel', 'Trajan Pro', Georgia, serif" font-size="98"
        font-weight="700" letter-spacing="6" fill="#c8920a" opacity="0.08"
        text-anchor="middle" filter="url(#glowSoft)">
    THE ARCHITECTURE
  </text>
  <text x="768" y="480" font-family="'Cinzel', 'Trajan Pro', Georgia, serif" font-size="98"
        font-weight="700" letter-spacing="6" fill="#c8920a" opacity="0.08"
        text-anchor="middle" filter="url(#glowSoft)">
    OF THE DIVINE LITURGY
  </text>

  <!-- Main title line 1 -->
  <text x="768" y="378" font-family="'Cinzel', 'Trajan Pro', Georgia, serif" font-size="96"
        font-weight="700" letter-spacing="5" fill="#f2d47a" opacity="0.92"
        text-anchor="middle" filter="url(#textGlow)">
    THE ARCHITECTURE
  </text>

  <!-- Thin rule between lines -->
  <rect x="340" y="396" width="856" height="0.7" fill="url(#ruleH)" opacity="0.35"/>

  <!-- Main title line 2 -->
  <text x="768" y="476" font-family="'Cinzel', 'Trajan Pro', Georgia, serif" font-size="96"
        font-weight="700" letter-spacing="5" fill="#f2d47a" opacity="0.92"
        text-anchor="middle" filter="url(#textGlow)">
    OF THE DIVINE LITURGY
  </text>

  <!-- ═══════════════════════════════════════════════
       SUBTITLE
  ════════════════════════════════════════════════ -->
  <text x="768" y="542" font-family="Georgia, 'EB Garamond', serif" font-size="20"
        font-style="italic" letter-spacing="1" fill="#7a7060" opacity="0.85"
        text-anchor="middle">
    Not a sequence of prayers — but a strictly organized spiritual system,
  </text>
  <text x="768" y="568" font-family="Georgia, 'EB Garamond', serif" font-size="20"
        font-style="italic" letter-spacing="1" fill="#7a7060" opacity="0.85"
        text-anchor="middle">
    where each part performs a specific function.
  </text>

  <!-- ═══════════════════════════════════════════════
       PROTOCOL TAGS
  ════════════════════════════════════════════════ -->
  <!-- Left tag: Sacred Protocol -->
  <rect x="598" y="604" width="170" height="30" fill="none"
        stroke="#6a1a08" stroke-width="0.8" opacity="0.65"/>
  <text x="683" y="624" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="10.5"
        letter-spacing="3.5" fill="#6a1a08" opacity="0.9" text-anchor="middle">
    SACRED PROTOCOL
  </text>

  <!-- Divider line -->
  <line x1="785" y1="619" x2="840" y2="619" stroke="url(#ruleH)" stroke-width="0.8" opacity="0.8"/>

  <!-- Right tag: Eastern Christianity -->
  <rect x="855" y="604" width="194" height="30" fill="none"
        stroke="#6a1a08" stroke-width="0.8" opacity="0.65"/>
  <text x="952" y="624" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="10.5"
        letter-spacing="3.5" fill="#6a1a08" opacity="0.9" text-anchor="middle">
    EASTERN CHRISTIANITY
  </text>

  <!-- ═══════════════════════════════════════════════
       THREE TIER LABELS (architectural layers)
  ════════════════════════════════════════════════ -->
  <!-- Central horizontal divider above tiers -->
  <rect x="120" y="690" width="1296" height="0.6" fill="url(#ruleH)" opacity="0.3"/>

  <!-- Tier 01 — LEFT -->
  <text x="200" y="738" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="9"
        letter-spacing="3" fill="#6a1a08" opacity="0.7" text-anchor="middle">
    01 — PREPARATORY
  </text>
  <text x="200" y="762" font-family="'Cinzel', 'Trajan Pro', Georgia, serif" font-size="15"
        letter-spacing="2" fill="#c4b896" opacity="0.65" text-anchor="middle">
    Proskomedia
  </text>
  <text x="200" y="780" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="9"
        letter-spacing="2" fill="#7a7060" opacity="0.45" text-anchor="middle">
    // state: initializing
  </text>

  <!-- Vertical separator 1 -->
  <line x1="435" y1="698" x2="435" y2="810" stroke="url(#ruleV)" stroke-width="0.6" opacity="0.35"/>

  <!-- Tier 02 — CENTER-LEFT -->
  <text x="602" y="738" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="9"
        letter-spacing="3" fill="#6a1a08" opacity="0.7" text-anchor="middle">
    02 — OPEN ACCESS
  </text>
  <text x="602" y="762" font-family="'Cinzel', 'Trajan Pro', Georgia, serif" font-size="15"
        letter-spacing="2" fill="#c4b896" opacity="0.65" text-anchor="middle">
    Liturgy of the Catechumens
  </text>
  <text x="602" y="780" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="9"
        letter-spacing="2" fill="#7a7060" opacity="0.45" text-anchor="middle">
    // access: public
  </text>

  <!-- Vertical separator 2 -->
  <line x1="934" y1="698" x2="934" y2="810" stroke="url(#ruleV)" stroke-width="0.6" opacity="0.35"/>

  <!-- Tier 03 — CENTER-RIGHT -->
  <text x="1100" y="738" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="9"
        letter-spacing="3" fill="#6a1a08" opacity="0.7" text-anchor="middle">
    03 — RESTRICTED CORE
  </text>
  <text x="1100" y="762" font-family="'Cinzel', 'Trajan Pro', Georgia, serif" font-size="15"
        letter-spacing="2" fill="#c4b896" opacity="0.65" text-anchor="middle">
    Liturgy of the Faithful
  </text>
  <text x="1100" y="780" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="9"
        letter-spacing="2" fill="#7a7060" opacity="0.45" text-anchor="middle">
    // access: restricted
  </text>

  <!-- Vertical separator 3 -->
  <line x1="1335" y1="698" x2="1335" y2="810" stroke="url(#ruleV)" stroke-width="0.6" opacity="0.35"/>

  <!-- ΘΕΩΣΙΣ right column -->
  <text x="1420" y="752" font-family="'Cinzel', 'Trajan Pro', Georgia, serif" font-size="20"
        letter-spacing="4" fill="#e8b84b" opacity="0.38" text-anchor="middle">
    ΘΕΩΣΙΣ
  </text>

  <!-- Bottom rule -->
  <rect x="120" y="812" width="1296" height="0.6" fill="url(#ruleH)" opacity="0.3"/>

  <!-- ═══════════════════════════════════════════════
       TRANSFORMATION FORMULA — bottom strip
  ════════════════════════════════════════════════ -->
  <!-- Human → Protocol → Union → Theosis -->
  <text x="768" y="862" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11"
        letter-spacing="5" fill="#c8920a" opacity="0.35" text-anchor="middle">
    INPUT: HUMAN &#160; → &#160; PROCESSING: PRAYERS · READINGS · SACRAMENT &#160; → &#160; OUTPUT: UNION WITH THE DIVINE
  </text>

  <!-- ═══════════════════════════════════════════════
       COLOPHON
  ════════════════════════════════════════════════ -->
  <text x="768" y="900" font-family="Georgia, 'EB Garamond', serif" font-size="13"
        font-style="italic" letter-spacing="1.5" fill="#7a7060" opacity="0.5" text-anchor="middle">
    The oldest protocol still executing.
  </text>

  <!-- Byzantine cross at very center (micro ornament) -->
  <text x="768" y="512" font-family="Georgia, serif" font-size="16"
        fill="#8a6420" opacity="0.35" text-anchor="middle">
    ☩
  </text>

</svg>
