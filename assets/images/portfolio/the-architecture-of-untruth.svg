<svg viewBox="0 0 1536 1024" xmlns="http://www.w3.org/2000/svg" width="1536" height="1024">
  <defs>

   

    <!-- Background vignette -->
    <radialGradient id="bg-vignette" cx="42%" cy="48%" r="72%">
      <stop offset="0%"   stop-color="#1a1916"/>
      <stop offset="100%" stop-color="#080806"/>
    </radialGradient>

    <!-- Warm glow behind figure cluster -->
    <radialGradient id="warm-glow" cx="50%" cy="60%" r="45%">
      <stop offset="0%"   stop-color="#8a6040" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#080806" stop-opacity="0"/>
    </radialGradient>

    <!-- Left rust accent glow -->
    <radialGradient id="rust-glow" cx="12%" cy="50%" r="35%">
      <stop offset="0%"   stop-color="#8a6040" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#080806" stop-opacity="0"/>
    </radialGradient>

    <!-- Figure fade gradient (top-to-bottom dissolve) -->
    <linearGradient id="fig-fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#b8b4a8" stop-opacity="0.22"/>
      <stop offset="55%"  stop-color="#b8b4a8" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#b8b4a8" stop-opacity="0"/>
    </linearGradient>

    <!-- Figure dim variant -->
    <linearGradient id="fig-fade-dim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#7a7870" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#7a7870" stop-opacity="0"/>
    </linearGradient>

    <!-- Horizontal rule gradient -->
    <linearGradient id="rule-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#2e2c28" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#2e2c28" stop-opacity="1"/>
      <stop offset="70%"  stop-color="#2e2c28" stop-opacity="1"/>
      <stop offset="100%" stop-color="#2e2c28" stop-opacity="0"/>
    </linearGradient>

    <!-- Rust rule -->
    <linearGradient id="rust-rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#8a6040" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#8a6040" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#8a6040" stop-opacity="0"/>
    </linearGradient>

    <!-- Noise texture filter -->
    <filter id="noise" x="0%" y="0%" width="100%" height="100%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="4" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="gray"/>
      <feBlend in="SourceGraphic" in2="gray" mode="overlay" result="blended"/>
      <feComponentTransfer in="blended">
        <feFuncA type="linear" slope="1"/>
      </feComponentTransfer>
    </filter>

    <!-- Soft blur for ghost figures -->
    <filter id="blur-soft">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>
    <filter id="blur-heavy">
      <feGaussianBlur stdDeviation="5"/>
    </filter>

    <!-- Clip for right-side fade -->
    <clipPath id="right-fade-clip">
      <rect x="0" y="0" width="1536" height="1024"/>
    </clipPath>

    <!-- Grain overlay rect gradient -->
    <linearGradient id="grain-overlay" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#080806" stop-opacity="0"/>
      <stop offset="100%" stop-color="#080806" stop-opacity="0.55"/>
    </linearGradient>

  </defs>

  <!-- ── BASE ── -->
  <rect width="1536" height="1024" fill="#080806"/>
  <rect width="1536" height="1024" fill="url(#bg-vignette)"/>
  <rect width="1536" height="1024" fill="url(#warm-glow)"/>
  <rect width="1536" height="1024" fill="url(#rust-glow)"/>

  <!-- ── ARCHITECTURAL GRID / STRUCTURE LINES ── -->
  <!-- Vertical column marks — ghost grid suggesting structure/blueprint -->
  <g opacity="0.04" stroke="#b8b4a8" stroke-width="1">
    <line x1="192"  y1="0" x2="192"  y2="1024"/>
    <line x1="384"  y1="0" x2="384"  y2="1024"/>
    <line x1="576"  y1="0" x2="576"  y2="1024"/>
    <line x1="768"  y1="0" x2="768"  y2="1024"/>
    <line x1="960"  y1="0" x2="960"  y2="1024"/>
    <line x1="1152" y1="0" x2="1152" y2="1024"/>
    <line x1="1344" y1="0" x2="1344" y2="1024"/>
    <line x1="0"    y1="256"  x2="1536" y2="256"/>
    <line x1="0"    y1="512"  x2="1536" y2="512"/>
    <line x1="0"    y1="768"  x2="1536" y2="768"/>
  </g>

  <!-- Diagonal stress line (architectural section cut) -->
  <line x1="0" y1="820" x2="520" y2="160" stroke="#2e2c28" stroke-width="1" opacity="0.35"/>
  <line x1="0" y1="840" x2="530" y2="160" stroke="#2e2c28" stroke-width="0.5" opacity="0.18"/>

  <!-- ── GIACOMETTI-STYLE FIGURES — right cluster ── -->

  <!-- Figure A: primary, centreright -->
  <g filter="url(#blur-soft)" transform="translate(960, 90)">
    <ellipse cx="0" cy="0" rx="11" ry="16" fill="url(#fig-fade)"/>
    <!-- neck -->
    <line x1="0" y1="14" x2="-4" y2="55" stroke="url(#fig-fade)" stroke-width="6" stroke-linecap="round"/>
    <!-- shoulders -->
    <line x1="-2" y1="35" x2="-55" y2="70"  stroke="url(#fig-fade)" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="-2" y1="35" x2="42"  y2="68"  stroke="url(#fig-fade)" stroke-width="3.5" stroke-linecap="round"/>
    <!-- arms hanging -->
    <line x1="-55" y1="70" x2="-62" y2="155" stroke="url(#fig-fade)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="42"  y1="68" x2="50"  y2="158" stroke="url(#fig-fade)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- torso -->
    <line x1="-4" y1="55" x2="-6"  y2="200" stroke="url(#fig-fade)" stroke-width="5" stroke-linecap="round"/>
    <!-- hips -->
    <line x1="-5" y1="180" x2="-35" y2="200" stroke="url(#fig-fade)" stroke-width="3" stroke-linecap="round"/>
    <line x1="-5" y1="180" x2="22"  y2="200" stroke="url(#fig-fade)" stroke-width="3" stroke-linecap="round"/>
    <!-- legs -->
    <line x1="-35" y1="200" x2="-42" y2="340" stroke="url(#fig-fade)" stroke-width="4" stroke-linecap="round"/>
    <line x1="22"  y1="200" x2="28"  y2="340" stroke="url(#fig-fade)" stroke-width="4" stroke-linecap="round"/>
    <!-- feet suggest -->
    <line x1="-42" y1="340" x2="-58" y2="352" stroke="url(#fig-fade)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="28"  y1="340" x2="12"  y2="352" stroke="url(#fig-fade)" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Figure B: secondary, offset left of A, slightly smaller -->
  <g filter="url(#blur-heavy)" transform="translate(820, 160)" opacity="0.7">
    <ellipse cx="0" cy="0" rx="8" ry="11" fill="url(#fig-fade-dim)"/>
    <line x1="0" y1="10" x2="-3" y2="40" stroke="url(#fig-fade-dim)" stroke-width="4" stroke-linecap="round"/>
    <line x1="-1" y1="25" x2="-38" y2="52" stroke="url(#fig-fade-dim)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-1" y1="25" x2="28"  y2="50" stroke="url(#fig-fade-dim)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-3" y1="40" x2="-4"  y2="160" stroke="url(#fig-fade-dim)" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="-3" y1="140" x2="-22" y2="158" stroke="url(#fig-fade-dim)" stroke-width="2" stroke-linecap="round"/>
    <line x1="-3" y1="140" x2="14"  y2="156" stroke="url(#fig-fade-dim)" stroke-width="2" stroke-linecap="round"/>
    <line x1="-22" y1="158" x2="-27" y2="258" stroke="url(#fig-fade-dim)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="14"  y1="156" x2="18"  y2="256" stroke="url(#fig-fade-dim)" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Figure C: far right, ghost -->
  <g filter="url(#blur-heavy)" transform="translate(1150, 200)" opacity="0.45">
    <ellipse cx="0" cy="0" rx="6" ry="9" fill="url(#fig-fade-dim)"/>
    <line x1="0" y1="8"  x2="2"  y2="35"  stroke="url(#fig-fade-dim)" stroke-width="3" stroke-linecap="round"/>
    <line x1="1" y1="20" x2="-25" y2="42" stroke="url(#fig-fade-dim)" stroke-width="2" stroke-linecap="round"/>
    <line x1="1" y1="20" x2="22"  y2="40" stroke="url(#fig-fade-dim)" stroke-width="2" stroke-linecap="round"/>
    <line x1="2" y1="35" x2="3"   y2="130" stroke="url(#fig-fade-dim)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="2" y1="115" x2="-14" y2="130" stroke="url(#fig-fade-dim)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="2" y1="115" x2="14"  y2="128" stroke="url(#fig-fade-dim)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-14" y1="130" x2="-18" y2="215" stroke="url(#fig-fade-dim)" stroke-width="2" stroke-linecap="round"/>
    <line x1="14"  y1="128" x2="17"  y2="213" stroke="url(#fig-fade-dim)" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- ── HORIZONTAL RULES ── -->
  <rect x="0" y="118" width="1536" height="1" fill="url(#rule-grad)" opacity="0.6"/>
  <rect x="0" y="870" width="1536" height="1" fill="url(#rule-grad)" opacity="0.5"/>

  <!-- Rust accent rule — below eyebrow -->
  <rect x="88" y="153" width="220" height="1" fill="url(#rust-rule)" opacity="0.8"/>

  <!-- ── EYEBROW / METADATA ── -->
  <!-- Monospace label top-left -->
  <text x="88" y="104"
        font-family="'Space Mono', 'Courier New', monospace"
        font-size="11"
        letter-spacing="6"
        fill="#8a6040"
        opacity="0.9"
        text-anchor="start">A PHILOSOPHICAL ARCHIVE</text>

  <!-- Top-right index -->
  <text x="1448" y="88"
        font-family="'Space Mono', 'Courier New', monospace"
        font-size="10"
        letter-spacing="3"
        fill="#4a4740"
        opacity="0.7"
        text-anchor="end">VOL. I — §001</text>
  <text x="1448" y="106"
        font-family="'Space Mono', 'Courier New', monospace"
        font-size="10"
        letter-spacing="3"
        fill="#4a4740"
        opacity="0.5"
        text-anchor="end">THE DEATH OF SINCERITY</text>

  <!-- ── GIANT GHOST NUMBER ── -->
  <text x="1410" y="880"
        font-family="'Bebas Neue', 'Impact', sans-serif"
        font-size="620"
        letter-spacing="-10"
        fill="none"
        stroke="#7a7870"
        stroke-width="1"
        opacity="0.05"
        text-anchor="end">I</text>

  <!-- ── MAIN TITLE — ARCHITECTURE OF UNTRUTH ── -->
  <!-- "THE" small above -->
  <text x="88" y="258"
        font-family="'Bebas Neue', 'Impact', sans-serif"
        font-size="38"
        letter-spacing="18"
        fill="#e8e4d8"
        opacity="0.55">THE</text>

  <!-- ARCHITECTURE — display, large -->
  <text x="82" y="420"
        font-family="'Bebas Neue', 'Impact', sans-serif"
        font-size="198"
        letter-spacing="-3"
        fill="#e8e4d8"
        opacity="0.95">ARCHITECTURE</text>

  <!-- OF — small connector -->
  <text x="88" y="478"
        font-family="'Bebas Neue', 'Impact', sans-serif"
        font-size="52"
        letter-spacing="20"
        fill="#e8e4d8"
        opacity="0.4">OF</text>

  <!-- UNTRUTH — warm amber accent, with implicit strikethrough echo -->
  <text x="82" y="638"
        font-family="'Bebas Neue', 'Impact', sans-serif"
        font-size="198"
        letter-spacing="-3"
        fill="#c4a882">UNTRUTH</text>

  <!-- Strikethrough line over UNTRUTH — echoes the ::after animation from hero -->
  <line x1="82" y1="571" x2="1050" y2="571" stroke="#8a6040" stroke-width="1.5" opacity="0.55"/>

  <!-- ── SUBTITLE — italic fell-style ── -->
  <text x="88" y="720"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="20"
        font-style="italic"
        letter-spacing="1"
        fill="#b8b4a8"
        opacity="0.7">On lies, omission, and the invisible structures of managed expression</text>

  <!-- ── PULL QUOTE — centred, lower third ── -->
  <text x="88" y="808"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="15.5"
        font-style="italic"
        fill="#c4a882"
        opacity="0.65">"The world did not lose truth in a single catastrophe.</text>
  <text x="88" y="830"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="15.5"
        font-style="italic"
        fill="#c4a882"
        opacity="0.65">It was surrendered — one polite exchange at a time."</text>

  <!-- ── MONO ANNOTATIONS — floating fragments ── -->
  <text x="1448" y="720"
        font-family="'Space Mono', 'Courier New', monospace"
        font-size="9"
        letter-spacing="3"
        fill="#4a4740"
        opacity="0.6"
        text-anchor="end">FIGURES AFTER GIACOMETTI</text>
  <text x="1448" y="740"
        font-family="'Space Mono', 'Courier New', monospace"
        font-size="9"
        letter-spacing="3"
        fill="#4a4740"
        opacity="0.5"
        text-anchor="end">TYPOGRAPHY — IM FELL ENGLISH</text>
  <text x="1448" y="758"
        font-family="'Space Mono', 'Courier New', monospace"
        font-size="9"
        letter-spacing="3"
        fill="#4a4740"
        opacity="0.4"
        text-anchor="end">BEBAS NEUE / SPACE MONO</text>

  <!-- Left column annotation -->
  <text transform="rotate(-90, 36, 512)"
        x="36" y="512"
        font-family="'Space Mono', 'Courier New', monospace"
        font-size="9"
        letter-spacing="5"
        fill="#4a4740"
        opacity="0.45"
        text-anchor="middle">PUBLISHED IN THE PRESENT TENSE — EDITED NEVER</text>

  <!-- ── FOOTER COLOPHON ── -->
  <text x="88" y="958"
        font-family="'Space Mono', 'Courier New', monospace"
        font-size="10"
        letter-spacing="2"
        fill="#4a4740"
        opacity="0.5">THE ARCHITECTURE OF UNTRUTH</text>
  <text x="88" y="974"
        font-family="'Space Mono', 'Courier New', monospace"
        font-size="9"
        letter-spacing="2"
        fill="#4a4740"
        opacity="0.35">A PHILOSOPHICAL ARCHIVE ON THE DEATH OF SINCERITY</text>

  <text x="1448" y="958"
        font-family="'Space Mono', 'Courier New', monospace"
        font-size="10"
        letter-spacing="2"
        fill="#4a4740"
        opacity="0.4"
        text-anchor="end">followorbounce.com</text>

  <!-- ── GRAIN OVERLAY ── -->
  <rect width="1536" height="1024" fill="url(#grain-overlay)" opacity="0.6"/>

  <!-- Noise filter overlay -->
  <rect width="1536" height="1024" fill="#b8b4a8" opacity="0.025" filter="url(#noise)"/>

</svg>
