<svg width="1536" height="1024" viewBox="0 0 1536 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>

    <!-- Void base gradient -->
    <radialGradient id="voidGrad" cx="72%" cy="48%" r="65%">
      <stop offset="0%" stop-color="#0a0300"/>
      <stop offset="55%" stop-color="#050503"/>
      <stop offset="100%" stop-color="#020201"/>
    </radialGradient>

    <!-- Star glow -->
    <radialGradient id="starCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="18%" stop-color="#ffcc66" stop-opacity="1"/>
      <stop offset="45%" stop-color="#ff6600" stop-opacity="0.85"/>
      <stop offset="75%" stop-color="#cc2200" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#cc2200" stop-opacity="0"/>
    </radialGradient>

    <!-- Star halo -->
    <radialGradient id="starHalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff4400" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#cc2200" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#880000" stop-opacity="0"/>
    </radialGradient>

    <!-- Acid green glow -->
    <radialGradient id="greenGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7fff00" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#7fff00" stop-opacity="0"/>
    </radialGradient>

    <!-- Scanline pattern -->
    <pattern id="scanlines" x="0" y="0" width="1" height="4" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="1536" height="2" fill="#000000" fill-opacity="0.07"/>
    </pattern>

    <!-- Fine grid -->
    <pattern id="grid" x="0" y="0" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M 64 0 L 0 0 0 64" fill="none" stroke="#7fff00" stroke-width="0.3" stroke-opacity="0.04"/>
    </pattern>

    <!-- Noise texture simulation via turbulence -->
    <filter id="grainFilter" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="4" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="gray"/>
      <feBlend in="SourceGraphic" in2="gray" mode="overlay" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>

    <!-- Star burst clip -->
    <clipPath id="starClip">
      <circle cx="1090" cy="490" r="300"/>
    </clipPath>

  </defs>

  <!-- ── BASE VOID ── -->
  <rect width="1536" height="1024" fill="url(#voidGrad)"/>

  <!-- ── GRID OVERLAY ── -->
  <rect width="1536" height="1024" fill="url(#grid)"/>

  <!-- ── BACKGROUND ATMOSPHERE – deep cosmic blue-void at left ── -->
  <ellipse cx="200" cy="512" rx="500" ry="500" fill="#000022" fill-opacity="0.35"/>

  <!-- ── STAR SYSTEM – right center ── -->

  <!-- Outermost diffuse halo -->
  <circle cx="1090" cy="490" r="380" fill="url(#starHalo)"/>

  <!-- Orbital rings -->
  <circle cx="1090" cy="490" r="290" fill="none" stroke="#cc4400" stroke-width="0.6" stroke-opacity="0.12"/>
  <circle cx="1090" cy="490" r="220" fill="none" stroke="#cc4400" stroke-width="0.6" stroke-opacity="0.18"/>
  <circle cx="1090" cy="490" r="160" fill="none" stroke="#ff6600" stroke-width="0.5" stroke-opacity="0.22"/>
  <circle cx="1090" cy="490" r="108" fill="none" stroke="#ff8800" stroke-width="0.5" stroke-opacity="0.28"/>
  <circle cx="1090" cy="490" r="66" fill="none" stroke="#ffaa00" stroke-width="0.5" stroke-opacity="0.35"/>
  <circle cx="1090" cy="490" r="36" fill="none" stroke="#ffcc00" stroke-width="0.8" stroke-opacity="0.45"/>

  <!-- Star rays – 8 directions -->
  <line x1="1090" y1="490" x2="1090" y2="170" stroke="#ff6600" stroke-width="0.7" stroke-opacity="0.18"/>
  <line x1="1090" y1="490" x2="1090" y2="810" stroke="#ff6600" stroke-width="0.7" stroke-opacity="0.18"/>
  <line x1="1090" y1="490" x2="770" y2="490" stroke="#ff6600" stroke-width="0.7" stroke-opacity="0.18"/>
  <line x1="1090" y1="490" x2="1410" y2="490" stroke="#ff6600" stroke-width="0.7" stroke-opacity="0.18"/>
  <line x1="1090" y1="490" x2="864" y2="264" stroke="#ff6600" stroke-width="0.5" stroke-opacity="0.11"/>
  <line x1="1090" y1="490" x2="1316" y2="716" stroke="#ff6600" stroke-width="0.5" stroke-opacity="0.11"/>
  <line x1="1090" y1="490" x2="1316" y2="264" stroke="#ff6600" stroke-width="0.5" stroke-opacity="0.11"/>
  <line x1="1090" y1="490" x2="864" y2="716" stroke="#ff6600" stroke-width="0.5" stroke-opacity="0.11"/>

  <!-- Star mid glow layer -->
  <circle cx="1090" cy="490" r="85" fill="#cc2200" fill-opacity="0.22"/>
  <circle cx="1090" cy="490" r="55" fill="#ff4400" fill-opacity="0.32"/>
  <circle cx="1090" cy="490" r="34" fill="#ff7700" fill-opacity="0.55"/>

  <!-- Star core -->
  <circle cx="1090" cy="490" r="18" fill="url(#starCore)"/>

  <!-- ── SCATTERED STARS – field ── -->
  <!-- Large -->
  <circle cx="180" cy="95" r="1.8" fill="#e8e0cc" fill-opacity="0.7"/>
  <circle cx="420" cy="58" r="1.2" fill="#e8e0cc" fill-opacity="0.5"/>
  <circle cx="640" cy="120" r="1.5" fill="#e8e0cc" fill-opacity="0.4"/>
  <circle cx="870" cy="80" r="1.0" fill="#e8e0cc" fill-opacity="0.55"/>
  <circle cx="1240" cy="66" r="1.4" fill="#e8e0cc" fill-opacity="0.45"/>
  <circle cx="1450" cy="110" r="1.8" fill="#e8e0cc" fill-opacity="0.35"/>
  <circle cx="70" cy="320" r="1.2" fill="#e8e0cc" fill-opacity="0.3"/>
  <circle cx="310" cy="780" r="1.5" fill="#e8e0cc" fill-opacity="0.4"/>
  <circle cx="480" cy="920" r="1.0" fill="#e8e0cc" fill-opacity="0.35"/>
  <circle cx="720" cy="860" r="1.3" fill="#e8e0cc" fill-opacity="0.45"/>
  <circle cx="1350" cy="900" r="1.6" fill="#e8e0cc" fill-opacity="0.3"/>
  <circle cx="1500" cy="820" r="1.1" fill="#e8e0cc" fill-opacity="0.5"/>
  <!-- Warm tinted -->
  <circle cx="290" cy="210" r="1.0" fill="#ffcc88" fill-opacity="0.4"/>
  <circle cx="555" cy="660" r="1.2" fill="#ffcc88" fill-opacity="0.3"/>
  <circle cx="1400" cy="330" r="1.0" fill="#ffcc88" fill-opacity="0.35"/>
  <!-- Blue tinted -->
  <circle cx="150" cy="610" r="1.1" fill="#8888ff" fill-opacity="0.3"/>
  <circle cx="660" cy="45" r="0.9" fill="#aaaaff" fill-opacity="0.35"/>
  <circle cx="1480" cy="460" r="1.0" fill="#8888ff" fill-opacity="0.25"/>
  <!-- Many small -->
  <circle cx="100" cy="190" r="0.6" fill="#e8e0cc" fill-opacity="0.25"/>
  <circle cx="230" cy="440" r="0.7" fill="#e8e0cc" fill-opacity="0.2"/>
  <circle cx="380" cy="350" r="0.6" fill="#e8e0cc" fill-opacity="0.3"/>
  <circle cx="500" cy="200" r="0.7" fill="#e8e0cc" fill-opacity="0.22"/>
  <circle cx="620" cy="750" r="0.6" fill="#e8e0cc" fill-opacity="0.28"/>
  <circle cx="780" cy="940" r="0.7" fill="#e8e0cc" fill-opacity="0.2"/>
  <circle cx="900" cy="820" r="0.6" fill="#e8e0cc" fill-opacity="0.25"/>
  <circle cx="1050" cy="150" r="0.7" fill="#e8e0cc" fill-opacity="0.22"/>
  <circle cx="1160" cy="900" r="0.6" fill="#e8e0cc" fill-opacity="0.3"/>
  <circle cx="1280" cy="170" r="0.7" fill="#e8e0cc" fill-opacity="0.2"/>
  <circle cx="1460" cy="650" r="0.6" fill="#e8e0cc" fill-opacity="0.28"/>
  <circle cx="50" cy="720" r="0.6" fill="#e8e0cc" fill-opacity="0.2"/>
  <circle cx="960" cy="40" r="0.8" fill="#e8e0cc" fill-opacity="0.3"/>

  <!-- ── ACID GREEN GLOW – bottom left corner atmosphere ── -->
  <ellipse cx="0" cy="1024" rx="300" ry="250" fill="#7fff00" fill-opacity="0.04"/>
  <ellipse cx="0" cy="1024" rx="140" ry="100" fill="#7fff00" fill-opacity="0.05"/>

  <!-- ── MAGENTA ACCENT – top right ── -->
  <ellipse cx="1536" cy="0" rx="280" ry="200" fill="#ff0080" fill-opacity="0.04"/>

  <!-- ── VERTICAL DIVIDER LINE – editorial ── -->
  <line x1="520" y1="80" x2="520" y2="944" stroke="#b8860b" stroke-width="0.5" stroke-opacity="0.18"/>

  <!-- ── HORIZONTAL RULE – top ── -->
  <line x1="80" y1="112" x2="520" y2="112" stroke="#b8860b" stroke-width="0.5" stroke-opacity="0.25"/>

  <!-- ── STAGE LABEL – tiny mono ── -->
  <text x="80" y="96" font-family="'Courier New', monospace" font-size="11" fill="#b8860b" fill-opacity="0.55" letter-spacing="4">STAGE I — VII · THE ETERNAL RETURN</text>

  <!-- ── MAIN TITLE – UnifrakturMaguntia fallback to serif ── -->
  <!-- "The" -->
  <text x="80" y="260"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="88"
        font-weight="400"
        fill="#e8e0cc"
        fill-opacity="0.92"
        letter-spacing="-1">The</text>

  <!-- "Hero's" -->
  <text x="80" y="390"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="154"
        font-weight="700"
        fill="#e8e0cc"
        fill-opacity="0.95"
        letter-spacing="-3">Hero's</text>

  <!-- "Journey" -->
  <text x="80" y="535"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="154"
        font-weight="700"
        fill="#e8e0cc"
        fill-opacity="0.95"
        letter-spacing="-3">Journey</text>

  <!-- ── GHOST BACKDROP TITLE – massive, burnt orange, behind ── -->
  <text x="72" y="560"
        font-family="'Arial Black', 'Impact', sans-serif"
        font-size="380"
        font-weight="900"
        fill="#cc4400"
        fill-opacity="0.04"
        letter-spacing="-10">HJ</text>

  <!-- ── SUBTITLE LINE ── -->
  <text x="80" y="590"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="18"
        font-style="italic"
        fill="#d4c400"
        fill-opacity="0.65"
        letter-spacing="1">A Ritual in Seven Deaths · Myths of All Cultures</text>

  <!-- ── HORIZONTAL RULE – below subtitle ── -->
  <line x1="80" y1="608" x2="460" y2="608" stroke="#d4c400" stroke-width="0.5" stroke-opacity="0.25"/>

  <!-- ── THREE ARCHETYPE LABELS – bottom left block ── -->
  <text x="80" y="680"
        font-family="'Courier New', monospace"
        font-size="10.5"
        fill="#7fff00"
        fill-opacity="0.45"
        letter-spacing="3.5">INITIATION · DESCENT · TRANSFORMATION</text>

  <text x="80" y="704"
        font-family="'Courier New', monospace"
        font-size="10.5"
        fill="#7fff00"
        fill-opacity="0.3"
        letter-spacing="3.5">GILGAMESH · INANNA · OSIRIS · CHRIST · ODIN</text>

  <text x="80" y="728"
        font-family="'Courier New', monospace"
        font-size="10.5"
        fill="#7fff00"
        fill-opacity="0.22"
        letter-spacing="3.5">O₂ + C → CO₂ + ∞ · LOGOS · THE ETERNAL RECORD</text>

  <!-- ── FORMULA BLOCK – bottom left ── -->
  <rect x="80" y="768" width="360" height="1" fill="#cc4400" fill-opacity="0.3"/>

  <text x="80" y="800"
        font-family="'Courier New', monospace"
        font-size="13"
        fill="#cc4400"
        fill-opacity="0.7"
        letter-spacing="2">function triggerDoor(soul, keys) {</text>
  <text x="80" y="820"
        font-family="'Courier New', monospace"
        font-size="13"
        fill="#cc4400"
        fill-opacity="0.4"
        letter-spacing="2">  if (faith.aligned) return soul.ascend();</text>
  <text x="80" y="840"
        font-family="'Courier New', monospace"
        font-size="13"
        fill="#cc4400"
        fill-opacity="0.25"
        letter-spacing="2">  return soul.wait(); // stars do not hurry</text>
  <text x="80" y="860"
        font-family="'Courier New', monospace"
        font-size="13"
        fill="#cc4400"
        fill-opacity="0.4"
        letter-spacing="2">}</text>

  <!-- ── CHOICE LABEL – bottom ── -->
  <text x="80" y="930"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="13"
        font-style="italic"
        fill="#e8e0cc"
        fill-opacity="0.2"
        letter-spacing="1">Will you become the destroyer or the redeemer?</text>

  <!-- ── RIGHT PANEL – vertical annotations ── -->

  <!-- "LUCIFER" vertical ghost text -->
  <text x="1470" y="880"
        font-family="'Arial Black', Impact, sans-serif"
        font-size="72"
        font-weight="900"
        fill="#7fff00"
        fill-opacity="0.05"
        transform="rotate(-90, 1470, 880)"
        letter-spacing="8">LUCIFER</text>

  <!-- "LOGOS" ghost -->
  <text x="580" y="820"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="130"
        font-weight="700"
        fill="#b8860b"
        fill-opacity="0.04"
        letter-spacing="6">LOGOS</text>

  <!-- Right side tag stack -->
  <text x="1380" y="120"
        font-family="'Courier New', monospace"
        font-size="10"
        fill="#b8860b"
        fill-opacity="0.35"
        letter-spacing="3"
        text-anchor="end">EXPERIMENTAL · EDITORIAL</text>

  <text x="1380" y="140"
        font-family="'Courier New', monospace"
        font-size="10"
        fill="#b8860b"
        fill-opacity="0.22"
        letter-spacing="3"
        text-anchor="end">LUXURY APOCALYPSE AESTHETICS</text>

  <!-- ── STAGE MARKERS – right side vertical ── -->
  <line x1="1370" y1="220" x2="1370" y2="760" stroke="#e8e0cc" stroke-width="0.4" stroke-opacity="0.08"/>

  <text x="1390" y="258" font-family="'Courier New', monospace" font-size="9.5" fill="#e8e0cc" fill-opacity="0.18" letter-spacing="2">I · SLEEP</text>
  <text x="1390" y="318" font-family="'Courier New', monospace" font-size="9.5" fill="#e8e0cc" fill-opacity="0.18" letter-spacing="2">II · AWAKENING</text>
  <text x="1390" y="378" font-family="'Courier New', monospace" font-size="9.5" fill="#e8e0cc" fill-opacity="0.18" letter-spacing="2">III · IGNITION</text>
  <text x="1390" y="438" font-family="'Courier New', monospace" font-size="9.5" fill="#e8e0cc" fill-opacity="0.18" letter-spacing="2">IV · THE CHOICE</text>
  <text x="1390" y="498" font-family="'Courier New', monospace" font-size="9.5" fill="#cc4400" fill-opacity="0.55" letter-spacing="2">V · TRIALS ←</text>
  <text x="1390" y="558" font-family="'Courier New', monospace" font-size="9.5" fill="#e8e0cc" fill-opacity="0.18" letter-spacing="2">VI · FIRE</text>
  <text x="1390" y="618" font-family="'Courier New', monospace" font-size="9.5" fill="#e8e0cc" fill-opacity="0.18" letter-spacing="2">VII · TRANSCENDENCE</text>
  <text x="1390" y="678" font-family="'Courier New', monospace" font-size="9.5" fill="#7fff00" fill-opacity="0.4" letter-spacing="2">VII½ · THE LOGOS</text>
  <text x="1390" y="738" font-family="'Courier New', monospace" font-size="9.5" fill="#e8e0cc" fill-opacity="0.18" letter-spacing="2">∞ · THE CYCLE</text>

