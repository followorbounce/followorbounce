  <line x1="1365" y1="614" x2="1372" y2="614" stroke="#e8e0cc" stroke-width="0.4" stroke-opacity="0.15"/>
  <line x1="1365" y1="674" x2="1372" y2="674" stroke="#7fff00" stroke-width="0.6" stroke-opacity="0.4"/>
  <line x1="1365" y1="734" x2="1372" y2="734" stroke="#e8e0cc" stroke-width="0.4" stroke-opacity="0.15"/>

  <!-- ── OUROBOROS CIRCLE – bottom right ── -->
  <circle cx="1200" cy="870" r="90" fill="none" stroke="#b8860b" stroke-width="0.6" stroke-opacity="0.15"/>
