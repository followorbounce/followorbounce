title: "Follow or Bounce"
description: "A publication at the intersection of technology, literature, and the agreements that hold them together."
author: "Follow or Bounce"

# Set baseurl to "/repo-name" for GitHub project pages, or "" for custom domains / user pages
baseurl: ""
url: "https://followorbounce.github.io"

# No gem theme — we use our own _layouts entirely
theme: ~

markdown: kramdown
permalink: pretty

sass:
  sass_dir: _sass
  style: compressed

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor

# Site-wide data used in templates
issue_number: "01"
established: "2024"

navigation:
#  - title: "About"
#    url: "/about/"
  - title: "Technology"
    url: "/technology/"
  - title: "Literature"
    url: "/literature/"
  - title: "Contracts"
    url: "/contracts/"
    children:
      - title: "Digital Law"
        url: "/contracts/digital-law/"
      - title: "Open Source"
        url: "/contracts/open-source/"
      - title: "Platform Terms"
        url: "/contracts/platform-terms/"
  - title: "Subscribe ↗"
    url: "/subscribe/"
    action: true
