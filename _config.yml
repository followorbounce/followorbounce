# ──────────────────────────────────────────────────────────────────────────────
# Follow or Bounce — Jekyll Configuration
# GitHub Pages compatible · Jekyll 3.10 · github-pages v232
# ──────────────────────────────────────────────────────────────────────────────

title: "Follow or Bounce"
description: "A publication at the intersection of technology, literature, and the agreements that hold them together."
author: "Follow or Bounce"
email: followorbounce@gmail.com

# ── GITHUB PAGES DEPLOYMENT ───────────────────────────────────────────────────
# Project site (e.g. username.github.io/follow-or-bounce):
#   baseurl: "/follow-or-bounce"
#   url: "https://username.github.io"
#
# User/org page (username.github.io) or custom domain:
#   baseurl: ""
#   url: "https://yourdomain.com"
baseurl: ""
url: "https://followorbounce.github.io"

# ── THEME ─────────────────────────────────────────────────────────────────────
# Explicitly set to minima so GitHub Pages does NOT auto-apply jekyll-theme-primer.
# Our own _layouts/ directory takes full precedence over any gem theme layouts.
theme: minima

# ── BUILD ─────────────────────────────────────────────────────────────────────
markdown: kramdown
highlighter: rouge
permalink: pretty

kramdown:
  input: GFM
  syntax_highlighter: rouge

# ── SASS ──────────────────────────────────────────────────────────────────────
sass:
  sass_dir: _sass
  style: compressed

# ── DEFAULTS ──────────────────────────────────────────────────────────────────
# Applies the "page" layout to all files inside pages/ that don't declare one.
# Using path-based scope avoids conflict with Jekyll's internal "pages" type.
defaults:
  - scope:
      path: "pages"
    values:
      layout: "page"
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

# ── EXCLUDE FROM BUILD ────────────────────────────────────────────────────────
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README.md
  - .gitignore
  - .sass-cache

# ── SITE META ─────────────────────────────────────────────────────────────────
issue_number: "01"
established: "2024"

# ── NAVIGATION ────────────────────────────────────────────────────────────────
# Add/remove items here — no template changes needed.
# Add a `children` list to create a dropdown submenu.
navigation:
  - title: "About"
    url: "/about/"
  - title: "Technology"
    url: "/technology/"
  - title: "Literature"
    url: "/literature/"
  - title: "Contracts"
    url: "/contracts/"
    children:
      - title: "Digital Law"
        url: "/contracts/digital-law/"
      - title: "Open Source"
        url: "/contracts/open-source/"
      - title: "Platform Terms"
        url: "/contracts/platform-terms/"
  - title: "Subscribe ↗"
    url: "/subscribe/"
    class: "action-link"
