# ─────────────────────────────────────────────
#  Follow or Bounce — _config.yml
#  Compatible with GitHub Pages (jekyll 3.10)
# ─────────────────────────────────────────────

title:       "Follow or Bounce"
tagline:     "Ideas that stick, or they don't."
description: "A publication at the intersection of technology, literature, and the agreements that hold them together."
baseurl:     ""
url:         "https://followorbounce.com"

brand:
  issue:       "Issue 01"
  established: "2024"
  email:       "followorbounce@gmail.com"

# Build
timezone: America/Honolulu

# Markdown
markdown:    kramdown
highlighter: rouge
kramdown:
  input:     GFM
  hard_wrap: false

# Sass
sass:
  sass_dir: _sass
  style:    compressed

# Permalink for posts
permalink: /:categories/:title/

# Collections — _pages outputs at /:path/
collections:
  pages:
    output:    true
    permalink: /:path/

# Defaults
defaults:
  - scope: { path: "", type: posts }
    values: { layout: post }
  - scope: { path: "", type: pages }
    values: { layout: page }
  - scope: { path: "" }
    values: { layout: default }

# GitHub Pages safe plugins only
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules/
  - vendor/
