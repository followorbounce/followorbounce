title:       "Follow or Bounce"
description: "A publication at the intersection of technology, literature, and the agreements that hold them together."
author:      "Follow or Bounce"

baseurl: ""
url:     "https://followorbounce.com"

theme: ~

markdown:  kramdown
permalink: pretty

sass:
  sass_dir: _sass
  style:    compressed

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor/
  - arc/
  - .vscode/
  - .gitignore
  - "*.swp"
  - "*.swo"

# Site-wide data used in templates
issue_number: "01"
established:  "2024"

navigation:
  - title: "About"
    url:   "/about/"
  - title: "Work"
    url:   "/work/"
  - title: "Technology"
    url:   "/technology/"
  - title: "Literature"
    url:   "/literature/"
  - title: "Contracts"
    url:   "/contracts/"
    children:
      - title: "Digital Law"
        url:   "/contracts/digital-law/"
      - title: "Open Source"
        url:   "/contracts/open-source/"
      - title: "Platform Terms"
        url:   "/contracts/platform-terms/"
  - title: "Subscribe ↗"
    url:   "/subscribe/"
    action: true
