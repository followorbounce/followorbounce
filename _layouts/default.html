<!DOCTYPE html>
<html lang="{{ page.lang | default: 'en' }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ── SEO ─────────────────────────────────────────────────────── -->
  <title>
    {%- if page.title -%}
      {{ page.title }} — {{ site.title }}
    {%- else -%}
      {{ site.title }}
    {%- endif -%}
  </title>
  <meta name="description" content="{{ page.description | default: site.description | strip_html | truncate: 160 }}" />
  <meta name="author" content="{{ site.author }}" />

  <!-- Open Graph -->
  <meta property="og:title" content="{{ page.title | default: site.title }}" />
  <meta property="og:description" content="{{ page.description | default: site.description }}" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="{{ page.url | absolute_url }}" />

  <!-- ── FONTS ────────────────────────────────────────────────────── -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />

  <!-- ── GLOBAL STYLES ────────────────────────────────────────────── -->
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" />

  <!-- ── PAGE-SPECIFIC STYLES ─────────────────────────────────────── -->
  <!-- Individual pages can declare `page_css: page-name` in their front matter -->
  {%- if page.page_css -%}
    <link rel="stylesheet" href="{{ '/assets/css/' | append: page.page_css | append: '.css' | relative_url }}" />
  {%- endif -%}

  <!-- ── CANONICAL ────────────────────────────────────────────────── -->
  <link rel="canonical" href="{{ page.url | absolute_url }}" />

  <!-- ── FAVICON ──────────────────────────────────────────────────── -->
  <link rel="icon" type="image/svg+xml" href="{{ '/assets/images/favicon.svg' | relative_url }}" />
</head>
<body class="{{ page.body_class }}">

  {% include header.html %}

  <main id="main-content" tabindex="-1">
    {{ content }}
  </main>

  {% include footer.html %}

  <!-- ── GLOBAL JS ────────────────────────────────────────────────── -->
  <script src="{{ '/assets/js/nav.js' | relative_url }}" defer></script>

  <!-- ── PAGE-SPECIFIC JS ─────────────────────────────────────────── -->
  {%- if page.page_js -%}
    <script src="{{ '/assets/js/' | append: page.page_js | append: '.js' | relative_url }}" defer></script>
  {%- endif -%}

</body>
</html>
