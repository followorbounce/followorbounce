---
layout: default
---
<div class="page-wrapper">

  {%- if page.show_hero != false -%}
  <section class="page-hero">
    {%- if page.eyebrow -%}
      <p class="eyebrow">{{ page.eyebrow }}</p>
    {%- endif -%}
    <h1>{{ page.title }}</h1>
    {%- if page.subtitle -%}
      <p class="page-hero__subtitle">{{ page.subtitle }}</p>
    {%- endif -%}
  </section>
  {%- endif -%}

  <div class="page-content">
    {{ content }}
  </div>

</div>
