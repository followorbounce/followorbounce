<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Обратная связь</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #333;
        }

        .wrapper {
            display: flex;
            height: 100vh;
            align-items: center;
            justify-content: center;
        }

        .form-box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            margin-top: 0;
            text-align: center;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 14px;
        }

        textarea {
            resize: none;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #667eea;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #5a67d8;
        }

        .footer {
            text-align: center;
            font-size: 12px;
            margin-top: 10px;
            color: #777;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="form-box">
        <h2>Обратная связь</h2>

        <form action="https://formsubmit.co/followorbounce@gmail.com" method="POST">

            <!-- отключить капчу -->
            <input type="hidden" name="_captcha" value="false">

            <!-- тема письма -->
            <input type="hidden" name="_subject" value="Новое сообщение с сайта">

            <!-- защита от ботов -->
            <input type="text" name="_honey" style="display:none">

            <!-- редирект (можешь удалить или поменять) -->
            <input type="hidden" name="_next" value="https://yourusername.github.io/thanks.html">

            <input type="text" name="name" placeholder="Ваше имя" required>
            <input type="email" name="email" placeholder="Ваш email" required>
            <textarea name="message" rows="5" placeholder="Ваше сообщение" required></textarea>

            <button type="submit">Отправить</button>
        </form>

        <div class="footer">
            Мы ответим вам как можно скорее
        </div>
    </div>
</div>

</body>
</html>
