# _data/portfolio.yml
# ─────────────────────────────────────────────────────────────────────────────
# Fields:
#   title        (required) Display title
#   category     (required) One of: web, branding, identity, development, graphic
#   tags         List of short label strings shown on the card
#   description  One or two sentences max
#   cover        Path relative to site root, e.g. /assets/images/portfolio/project.jpg
#                Recommended size: 1200×675px (16:9)
#   url          External URL — opens in new tab
#   case_study   Internal path, e.g. /work/project-name/
#   behance      Behance project URL
#   dribbble     Dribbble shot URL
#   figma        Figma file share URL
#   featured     true → appears in Featured row at top
#   year         4-digit year string
# ─────────────────────────────────────────────────────────────────────────────

