<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Journal</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1612;
    --paper: #f5f0e8;
    --accent: #c84b2f;
    --muted: #8a7f72;
    --rule: #d4cfc6;
  }

- { margin: 0; padding: 0; box-sizing: border-box; }

body {
background: var(–paper);
color: var(–ink);
font-family: ‘DM Mono’, monospace;
font-weight: 300;
min-height: 100vh;
position: relative;
}

/* Grain overlay */
body::before {
content: ‘’;
position: fixed;
inset: 0;
background-image: url(“data:image/svg+xml,%3Csvg viewBox=‘0 0 256 256’ xmlns=‘http://www.w3.org/2000/svg’%3E%3Cfilter id=‘noise’%3E%3CfeTurbulence type=‘fractalNoise’ baseFrequency=‘0.9’ numOctaves=‘4’ stitchTiles=‘stitch’/%3E%3C/filter%3E%3Crect width=‘100%25’ height=‘100%25’ filter=‘url(%23noise)’ opacity=‘0.04’/%3E%3C/svg%3E”);
pointer-events: none;
z-index: 999;
opacity: 0.6;
}

header {
border-bottom: 1px solid var(–rule);
padding: 2rem 0 1.5rem;
text-align: center;
position: relative;
}

header::after {
content: ‘’;
display: block;
width: 40px;
height: 2px;
background: var(–accent);
margin: 1rem auto 0;
}

.site-title {
font-family: ‘Playfair Display’, serif;
font-size: clamp(2rem, 5vw, 3.5rem);
font-weight: 700;
letter-spacing: -0.02em;
line-height: 1;
}

.site-subtitle {
font-size: 0.7rem;
letter-spacing: 0.25em;
text-transform: uppercase;
color: var(–muted);
margin-top: 0.5rem;
}

main {
max-width: 760px;
margin: 0 auto;
padding: 3rem 2rem 6rem;
}

/* Loading state */
.loading {
text-align: center;
padding: 6rem 0;
color: var(–muted);
font-size: 0.75rem;
letter-spacing: 0.15em;
}

.loading::before {
content: ‘···’;
display: block;
font-size: 2rem;
margin-bottom: 1rem;
animation: pulse 1.5s ease-in-out infinite;
}

@keyframes pulse {
0%, 100% { opacity: 0.3; }
50% { opacity: 1; }
}

/* Posts */
.post {
padding: 2.5rem 0;
border-bottom: 1px solid var(–rule);
animation: fadeUp 0.5s ease both;
}

.post:first-child { padding-top: 0; }

@keyframes fadeUp {
from { opacity: 0; transform: translateY(16px); }
to   { opacity: 1; transform: translateY(0); }
}

.post-meta {
display: flex;
align-items: center;
gap: 1rem;
margin-bottom: 1rem;
}

.post-date {
font-size: 0.68rem;
letter-spacing: 0.12em;
color: var(–muted);
text-transform: uppercase;
}

.post-tag {
font-size: 0.65rem;
letter-spacing: 0.1em;
text-transform: uppercase;
background: var(–accent);
color: white;
padding: 0.15em 0.5em;
border-radius: 2px;
}

.post-title {
font-family: ‘Playfair Display’, serif;
font-size: clamp(1.4rem, 3vw, 2rem);
line-height: 1.2;
margin-bottom: 1rem;
font-weight: 700;
}

.post-title a {
color: inherit;
text-decoration: none;
transition: color 0.2s;
}

.post-title a:hover { color: var(–accent); }

.post-image {
width: 100%;
max-height: 480px;
object-fit: cover;
margin-bottom: 1.25rem;
display: block;
filter: sepia(0.08);
}

.post-body {
font-size: 0.85rem;
line-height: 1.85;
color: #3a342c;
}

.post-body p + p { margin-top: 0.8em; }

/* Empty state */
.empty {
text-align: center;
padding: 6rem 0;
color: var(–muted);
}

.empty-icon {
font-size: 3rem;
display: block;
margin-bottom: 1rem;
opacity: 0.4;
}

.empty p {
font-size: 0.75rem;
letter-spacing: 0.1em;
text-transform: uppercase;
}

/* Footer */
footer {
position: fixed;
bottom: 0;
left: 0;
right: 0;
background: var(–paper);
border-top: 1px solid var(–rule);
padding: 0.75rem 2rem;
display: flex;
justify-content: space-between;
align-items: center;
font-size: 0.65rem;
letter-spacing: 0.1em;
text-transform: uppercase;
color: var(–muted);
}

footer a {
color: var(–accent);
text-decoration: none;
}

footer a:hover { text-decoration: underline; }

@media (max-width: 600px) {
main { padding: 2rem 1.25rem 5rem; }
}
</style>

</head>
<body>

<header>
  <div class="site-title" id="site-title">Journal</div>
  <div class="site-subtitle" id="site-subtitle">Notes & Images</div>
</header>

<main id="posts-container">
  <div class="loading">Loading</div>
</main>

<footer>
  <span id="post-count">—</span>
  <a href="admin.html">Admin →</a>
</footer>

<script>
const POSTS_URL = 'posts.json';

function formatDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
}

function renderPost(post, index) {
  const delay = index * 80;
  return `
    <article class="post" style="animation-delay:${delay}ms">
      <div class="post-meta">
        <span class="post-date">${formatDate(post.date)}</span>
        ${post.tag ? `<span class="post-tag">${post.tag}</span>` : ''}
      </div>
      ${post.title ? `<h2 class="post-title">${post.title}</h2>` : ''}
      ${post.image ? `<img class="post-image" src="${post.image}" alt="${post.title || ''}" loading="lazy">` : ''}
      ${post.body ? `<div class="post-body">${post.body.split('\n').map(p => p.trim() ? `<p>${p}</p>` : '').join('')}</div>` : ''}
    </article>
  `;
}

async function loadPosts() {
  const container = document.getElementById('posts-container');
  const countEl = document.getElementById('post-count');

  try {
    const res = await fetch(POSTS_URL + '?v=' + Date.now());
    if (!res.ok) throw new Error('Not found');
    const data = await res.json();

    // Update site meta
    if (data.site) {
      document.title = data.site.title || 'Journal';
      document.getElementById('site-title').textContent = data.site.title || 'Journal';
      document.getElementById('site-subtitle').textContent = data.site.subtitle || '';
    }

    const posts = (data.posts || []).sort((a, b) => new Date(b.date) - new Date(a.date));

    if (!posts.length) {
      container.innerHTML = `
        <div class="empty">
          <span class="empty-icon">◻</span>
          <p>No posts yet</p>
        </div>`;
      countEl.textContent = '0 posts';
      return;
    }

    container.innerHTML = posts.map(renderPost).join('');
    countEl.textContent = `${posts.length} post${posts.length !== 1 ? 's' : ''}`;

  } catch (e) {
    container.innerHTML = `
      <div class="empty">
        <span class="empty-icon">✕</span>
        <p>Could not load posts.json</p>
      </div>`;
    countEl.textContent = 'Error';
  }
}

loadPosts();
</script>

</body>
</html>
